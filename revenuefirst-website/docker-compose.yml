version: "3.8"
services:
  revenuefirst-web:
    image: nginx:alpine
    container_name: revenuefirst-web
    restart: unless-stopped
    volumes:
      - ./www:/usr/share/nginx/html:ro
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.revenuefirst.rule=Host(`revenuefirst.ai`) || Host(`www.revenuefirst.ai`)"
      - "traefik.http.routers.revenuefirst.entrypoints=websecure"
      - "traefik.http.routers.revenuefirst.tls.certresolver=letsencrypt"
      - "traefik.http.services.revenuefirst.loadbalancer.server.port=80"
networks:
  traefik-public:
    external: true

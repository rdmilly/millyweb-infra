# Test domains for rapid development iteration
# test1, test2, test3 → VPS2 ports 4001, 4002, 4003

http:
  routers:
    test1:
      rule: "Host(`test1.millyweb.com`)"
      entryPoints: [websecure]
      service: test1
      tls: {certResolver: cloudflare}
    test2:
      rule: "Host(`test2.millyweb.com`)"
      entryPoints: [websecure]
      service: test2
      tls: {certResolver: cloudflare}
    test3:
      rule: "Host(`test3.millyweb.com`)"
      entryPoints: [websecure]
      service: test3
      tls: {certResolver: cloudflare}

  services:
    test1:
      loadBalancer:
        servers:
          - url: "http://10.0.0.2:4001"
    test2:
      loadBalancer:
        servers:
          - url: "http://10.0.0.2:4002"
    test3:
      loadBalancer:
        servers:
          - url: "http://10.0.0.2:4003"

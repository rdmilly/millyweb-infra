services:
  invoiceninja-db:
    image: mysql:8.0
    container_name: invoiceninja-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: invoiceninja
      MYSQL_USER: invoiceninja
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - invoiceninja-internal
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  invoiceninja-app:
    image: invoiceninja/invoiceninja-debian:latest
    container_name: invoiceninja-app
    restart: unless-stopped
    depends_on:
      invoiceninja-db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ninja-public:/var/www/html/public
      - ninja-storage:/var/www/html/storage
    networks:
      - invoiceninja-internal

  invoiceninja-web:
    image: nginx:alpine
    container_name: invoiceninja-web
    restart: unless-stopped
    depends_on:
      - invoiceninja-app
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ninja-public:/var/www/html/public:ro
    ports:
      - "8095:80"
    networks:
      - invoiceninja-internal
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.invoiceninja.rule=Host(`invoice.millyweb.com`)"
      - "traefik.http.routers.invoiceninja.entrypoints=https"
      - "traefik.http.routers.invoiceninja.tls=true"
      - "traefik.http.routers.invoiceninja.tls.certresolver=letsencrypt"
      - "traefik.http.routers.invoiceninja.service=invoiceninja"
      - "traefik.http.services.invoiceninja.loadbalancer.server.port=80"
      - "traefik.http.routers.invoiceninja-http.rule=Host(`invoice.millyweb.com`)"
      - "traefik.http.routers.invoiceninja-http.entrypoints=http"
      - "traefik.http.routers.invoiceninja-http.service=invoiceninja"

volumes:
  ninja-public:
  ninja-storage:

networks:
  invoiceninja-internal:
    driver: bridge
  coolify:
    external: true
    name: coolify
